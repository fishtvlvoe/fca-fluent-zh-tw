name: 自動發布 Release

on:
  push:
    branches:
      - main
    paths:
      - 'languages/**'
      - 'fca-fluent-zh-tw.php'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 取得最新版本號
        id: version
        run: |
          VERSION=$(grep "Version:" fca-fluent-zh-tw.php | head -1 | sed 's/.*Version: //;s/ .*//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "版本號: $VERSION"

      - name: 檢查 Release 是否已存在
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 打包外掛
        if: steps.check.outputs.exists == 'false'
        run: |
          bash build.sh
          # build.sh 輸出到上層目錄，移到當前目錄
          mv ../fca-fluent-zh-tw-*.zip . 2>/dev/null || true
          ls -lh fca-fluent-zh-tw-*.zip

      - name: 建立 Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## FCA & Fluent 繁體中文翻譯包 v${{ steps.version.outputs.version }}

            翻譯字串更新與修正。詳見 Git 提交記錄。
          files: fca-fluent-zh-tw-*.zip
          draft: false
          prerelease: false
